<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Build — Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root{
    --canvas:#16161a; --canvas-deep:#101013; --panel:#1b1b20; --inset:#202027; --raised:#26262d; --sidebar:#121316;
    --line:rgba(232,224,205,.08); --line-2:rgba(232,224,205,.12); --line-3:rgba(232,224,205,.20);
    --text:#f1ede2; --text-2:#b9b9c0; --muted:#83838c;
    --accent:#c8a24a; --accent-soft:rgba(200,162,74,.12); --accent-border:rgba(200,162,74,.34); --accent-contrast:#ecd596;
    --ok:#7fb89a; --ok-text:#a3d0b8; --ok-soft:rgba(127,184,154,.14); --ok-border:rgba(127,184,154,.4);
    --warn:#d8a24a; --warn-text:#e7c486; --warn-soft:rgba(216,162,74,.13); --warn-border:rgba(216,162,74,.4);
    --red:#cc6a6a; --red-text:#e29a9a; --red-soft:rgba(204,106,106,.14); --red-border:rgba(204,106,106,.4);
    --blue:#88b6d8; --blue-text:#9cc1e0; --blue-soft:rgba(136,182,216,.14); --vio:#9678c8; --vio-text:#cdbbe6;
    --serif:"Fraunces",Georgia,serif; --sans:"Geist",ui-sans-serif,system-ui,sans-serif; --mono:"Geist Mono",ui-monospace,monospace;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--canvas);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
  a{color:inherit;text-decoration:none}
  ::selection{background:rgba(200,162,74,.28)}
  ::-webkit-scrollbar{width:9px;height:9px}::-webkit-scrollbar-thumb{background:rgba(232,224,205,.13);border-radius:6px;border:2px solid transparent;background-clip:padding-box}
  :focus-visible{outline:2px solid var(--accent-border);outline-offset:2px;border-radius:6px}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  .app{display:grid;grid-template-columns:236px minmax(0,1fr);height:100vh;overflow:hidden}

  /* nav rail */
  .rail{display:flex;flex-direction:column;min-height:0;background:var(--sidebar);border-right:1px solid var(--line-2);padding:14px 12px}
  .ws{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:9px;cursor:pointer}.ws:hover{background:rgba(255,255,255,.045)}
  .ws .mk{width:30px;height:30px;border-radius:8px;border:1px solid var(--accent-border);background:var(--accent-soft);display:grid;place-items:center;font-family:var(--serif);font-weight:600;color:var(--accent);font-size:15px}
  .ws .nm{font-weight:600;font-size:13px;letter-spacing:-.01em;line-height:1.15}.ws .pl{font-size:10px;color:var(--muted)}.ws .cv{margin-left:auto;color:var(--muted);font-size:11px}
  .indtag{margin:8px 8px 6px;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;color:var(--muted);border:1px solid var(--line-2);border-radius:6px;padding:4px 8px;display:flex;align-items:center;gap:6px}
  .indtag i{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:breathe 3.4s var(--ease) infinite}
  @keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(200,162,74,.4);opacity:.65}50%{box-shadow:0 0 0 4px rgba(200,162,74,0);opacity:1}}
  .navwrap{flex:1;min-height:0;overflow:auto;padding-top:2px}
  .grp{font-size:9.5px;font-weight:600;letter-spacing:.13em;color:var(--muted);padding:13px 10px 6px}.grp:first-child{padding-top:2px}
  .nav{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;color:var(--text-2);font-size:13px;font-weight:500;position:relative;cursor:pointer;transition:background .15s var(--ease),color .15s var(--ease)}
  .nav svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;opacity:.85}
  .nav:hover{background:rgba(255,255,255,.035);color:var(--text)}
  .user{display:flex;align-items:center;gap:10px;padding:10px 8px 2px;margin-top:8px;border-top:1px solid var(--line);cursor:pointer;border-radius:8px}
  .user.on{background:var(--accent-soft)} .user.on .cog{color:var(--accent)}
  .av{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);background:var(--inset);display:grid;place-items:center;font-family:var(--serif);font-weight:600;color:var(--accent);font-size:13px}
  .user .nm{font-size:12.5px;font-weight:600}.user .cog{margin-left:auto;color:var(--muted)}

  /* top */
  .main{display:flex;flex-direction:column;min-width:0;min-height:0}
  .top{display:flex;align-items:center;gap:14px;padding:11px 22px;border-bottom:1px solid var(--line-2);background:color-mix(in srgb,var(--canvas-deep) 60%,transparent)}
  .crumb{font-size:14px;font-weight:600;font-family:var(--serif);letter-spacing:-.01em}
  .search{margin:0 auto;display:flex;align-items:center;gap:9px;width:300px;max-width:30vw;height:32px;padding:0 11px;border:1px solid var(--line-2);border-radius:8px;background:color-mix(in srgb,var(--inset) 70%,transparent);color:var(--muted);font-size:12.5px;cursor:pointer}
  .search svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7}.search .k{margin-left:auto;font-family:var(--mono);font-size:10px;border:1px solid var(--line-2);border-radius:5px;padding:1px 6px}
  .topav{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);background:var(--inset);display:grid;place-items:center;font-family:var(--serif);font-weight:600;color:var(--accent);font-size:12px;cursor:pointer}

  /* settings layout */
  .setbody{flex:1;min-height:0;display:grid;grid-template-columns:230px minmax(0,1fr);overflow:hidden}
  .setnav{border-right:1px solid var(--line);overflow:auto;padding:14px 12px;display:flex;flex-direction:column;gap:1px}
  .setsearch{display:flex;align-items:center;gap:8px;height:32px;padding:0 10px;border:1px solid var(--line-2);border-radius:8px;background:var(--inset);margin-bottom:8px}
  .setsearch svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:1.8}
  .setsearch input{flex:1;background:transparent;border:0;color:var(--text);font:inherit;font-size:12px;outline:none}
  .setgrp{font-size:9px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;padding:13px 10px 5px}
  .setitem{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;color:var(--text-2);font-size:12.5px;font-weight:500;cursor:pointer;transition:.14s}
  .setitem:hover{background:rgba(255,255,255,.035);color:var(--text)}
  .setitem.on{background:var(--accent-soft);color:var(--text);box-shadow:inset 2px 0 0 var(--accent)}
  .setitem svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7;opacity:.85}.setitem.on svg{color:var(--accent);opacity:1}
  .setitem .sd{margin-left:auto;width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .setmain{overflow:auto;padding:22px clamp(20px,3vw,34px) 56px}
  .setmain-in{max-width:760px}
  .sechead{margin-bottom:18px}
  .sechead h2{font-family:var(--serif);font-weight:500;font-size:22px;letter-spacing:-.02em;margin:0}
  .sechead p{font-size:12.5px;color:var(--muted);margin:5px 0 0;max-width:66ch;line-height:1.5}

  .panel{border:1px solid var(--line-2);border-radius:14px;background:var(--panel);margin-bottom:16px;overflow:hidden}
  .panel-h{display:flex;align-items:center;gap:9px;padding:13px 16px;border-bottom:1px solid var(--line)}
  .panel-h h3{font-size:13.5px;font-weight:600;margin:0}.panel-h .ph-d{font-size:11px;color:var(--muted)}
  .panel-h .tg{margin-left:auto}
  .panel-b{padding:2px 16px}
  .panel-f{padding:11px 16px;border-top:1px solid var(--line);font-size:11px;color:var(--muted);display:flex;align-items:center;gap:8px;background:color-mix(in srgb,var(--canvas-deep) 22%,transparent)}
  .panel-f svg{width:12px;height:12px;stroke:var(--ok-text);fill:none;stroke-width:2}

  .srow{display:flex;align-items:center;gap:16px;padding:13px 0;border-bottom:1px solid var(--line)}
  .srow:last-child{border-bottom:0}
  .srow .sl{flex:1;min-width:0}.srow .slt{font-size:13px;font-weight:500}.srow .sld{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.4}
  .srow .sc{flex-shrink:0}

  .tg{font-family:var(--mono);font-size:8.5px;letter-spacing:.02em;border-radius:4px;padding:1px 6px;font-weight:600;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
  .tg.ok{color:var(--ok-text);background:var(--ok-soft);border:1px solid var(--ok-border)}
  .tg.est{color:var(--warn-text);background:var(--warn-soft);border:1px solid var(--warn-border)}

  .inp,.sel{background:var(--inset);border:1px solid var(--line-2);border-radius:8px;color:var(--text);font:inherit;font-size:12.5px;padding:8px 11px;outline:none}
  .inp:focus,.sel:focus{border-color:var(--accent-border)} .inp{min-width:230px}
  .sel{cursor:pointer;min-width:150px}
  .seg{display:inline-flex;background:var(--inset);border:1px solid var(--line-2);border-radius:9px;padding:3px}
  .seg button{font:inherit;font-size:11.5px;font-weight:600;color:var(--text-2);background:transparent;border:0;border-radius:6px;padding:6px 13px;cursor:pointer;transition:.14s}
  .seg button.on{background:var(--accent-soft);color:var(--text);box-shadow:inset 0 0 0 1px var(--accent-border)}
  .sw{display:inline-block;vertical-align:middle;width:38px;height:22px;border-radius:99px;background:var(--inset);border:1px solid var(--line-2);position:relative;cursor:pointer;transition:.16s;flex-shrink:0}
  .sw i{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--muted);transition:.16s}
  .sw.on{background:var(--accent-soft);border-color:var(--accent-border)}.sw.on i{left:18px;background:var(--accent)}
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;height:34px;padding:0 14px;border-radius:8px;border:1px solid var(--line-2);background:transparent;color:var(--text-2);font:inherit;font-weight:600;font-size:12.5px;cursor:pointer;transition:.15s;white-space:nowrap}
  .btn:hover{border-color:var(--accent-border);color:var(--text)}.btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
  .btn.gold{border:1px solid #b8974a;background:linear-gradient(180deg,#dcbd6e,#c8a24a 55%,#ad8838);color:#201808}.btn.gold:hover{filter:brightness(1.04)}
  .btn.sm{height:28px;padding:0 11px;font-size:11.5px}
  .btn.danger:hover{border-color:var(--red-border);color:var(--red-text)}

  .spill{font-size:10px;font-weight:600;border-radius:6px;padding:3px 9px;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
  .spill .pd{width:6px;height:6px;border-radius:50%;background:currentColor}
  .spill.ok{color:var(--ok-text);background:var(--ok-soft)} .spill.off{color:var(--muted);background:var(--inset)} .spill.err{color:var(--red-text);background:var(--red-soft)} .spill.warn{color:var(--warn-text);background:var(--warn-soft)}

  .accsw{display:flex;gap:9px}
  .accopt{width:28px;height:28px;border-radius:8px;cursor:pointer;border:2px solid transparent;transition:.14s}.accopt:hover{transform:scale(1.08)}.accopt.on{border-color:#fff;box-shadow:0 0 0 1px rgba(0,0,0,.4),0 0 0 3px rgba(255,255,255,.25)}

  /* connector card */
  .conn{display:flex;align-items:flex-start;gap:13px;padding:15px 0;border-bottom:1px solid var(--line)}
  .conn:last-child{border-bottom:0}
  .conn .ci{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;flex-shrink:0;font-family:var(--serif);font-weight:600;font-size:18px}
  .conn .cb{flex:1;min-width:0}
  .conn .cn{font-size:13.5px;font-weight:600;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .conn .cd{font-size:11.5px;color:var(--muted);margin-top:3px;line-height:1.45;max-width:46ch}
  .conn .cm{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
  .badge{font-size:9px;font-weight:700;letter-spacing:.03em;text-transform:uppercase;border-radius:5px;padding:2px 7px;border:1px solid var(--line-2);color:var(--muted)}
  .conn .cact{display:flex;flex-direction:column;gap:7px;align-items:flex-end;flex-shrink:0}
  .conn.avail{opacity:.6}

  /* member + token */
  .mem,.tok{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}
  .mem:last-child,.tok:last-child{border-bottom:0}
  .mem .ma{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-family:var(--serif);font-weight:600;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-border);flex-shrink:0;font-size:13px}
  .mem .mi{flex:1;min-width:0}.mem .mn{font-size:13px;font-weight:600}.mem .me{font-size:11px;color:var(--muted)}
  .tok .tki{flex:1;min-width:0;font-size:12.5px}.tok .tkn{font-weight:600}.tok .tkp{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:2px}

  .ukpis{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:6px}
  .ukpi{border:1px solid var(--line-2);border-radius:11px;background:var(--inset);padding:13px 14px}
  .ukpi .uv{font-family:var(--serif);font-size:23px;font-weight:500;letter-spacing:-.02em}.ukpi .ul{font-size:11px;color:var(--muted);margin-top:4px}
  .ubar{height:6px;border-radius:99px;background:var(--inset);overflow:hidden;margin-top:10px}.ubar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent-contrast))}

  /* connections marketplace */
  .cnote{font-size:11.5px;color:var(--muted);line-height:1.55;margin-bottom:13px;display:flex;gap:9px;align-items:flex-start;border:1px solid var(--ok-border);border-radius:11px;padding:11px 13px;background:linear-gradient(180deg,var(--ok-soft),transparent)}
  .cnote svg{width:15px;height:15px;stroke:var(--ok-text);fill:none;stroke-width:1.8;flex-shrink:0;margin-top:1px}
  .cnote b{color:var(--text);font-weight:600}
  .connhub-search{display:flex;align-items:center;gap:8px;height:34px;padding:0 11px;border:1px solid var(--line-2);border-radius:9px;background:var(--inset);margin-bottom:11px;max-width:340px}
  .connhub-search svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:1.8}
  .connhub-search input{flex:1;background:transparent;border:0;color:var(--text);font:inherit;font-size:12.5px;outline:none}
  .catchips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
  .catchip{font-size:11px;font-weight:600;color:var(--muted);border:1px solid var(--line-2);border-radius:99px;padding:5px 12px;cursor:pointer;transition:.14s}
  .catchip:hover{color:var(--text-2)} .catchip.on{color:var(--text);border-color:var(--accent-border);background:var(--accent-soft)}
  .conngrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(214px,1fr));gap:11px}
  .ccard{border:1px solid var(--line-2);border-radius:13px;background:var(--panel);padding:13px;display:flex;flex-direction:column;gap:9px;transition:.16s var(--ease);min-height:132px}
  .ccard:hover{border-color:var(--accent-border);transform:translateY(-2px);box-shadow:0 16px 36px -26px rgba(0,0,0,.85)}
  .ccard .ct{display:flex;align-items:flex-start;gap:10px}
  .clogo{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-family:var(--serif);font-weight:600;font-size:14px;flex-shrink:0;line-height:1}
  .ccard .cnm{font-size:13px;font-weight:600;letter-spacing:-.01em}
  .ccard .ccat{font-size:10px;color:var(--muted);margin-top:2px}
  .ccard .cdsc{font-size:11px;color:var(--muted);line-height:1.45;flex:1}
  .ccard .cfoot{display:flex;align-items:center;gap:8px}
  .ccard .cfoot .grow{flex:1}
  .cb-add{font-size:11.5px;font-weight:600;color:#201808;background:linear-gradient(180deg,#dcbd6e,#c8a24a 55%,#ad8838);border:1px solid #b8974a;border-radius:7px;padding:5px 13px;cursor:pointer}.cb-add:hover{filter:brightness(1.05)}
  .cb-mng{font-size:11.5px;font-weight:600;color:var(--text-2);background:transparent;border:1px solid var(--line-2);border-radius:7px;padding:5px 11px;cursor:pointer}.cb-mng:hover{border-color:var(--accent-border);color:var(--text)}

  /* overview */
  .ovgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(166px,1fr));gap:11px;margin-bottom:16px}
  .ovcard{border:1px solid var(--line-2);border-radius:12px;background:var(--panel);padding:13px 14px;cursor:pointer;transition:.15s var(--ease)}
  .ovcard:hover{border-color:var(--accent-border);transform:translateY(-2px)}
  .ovcard .ovi{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;color:var(--accent);background:var(--accent-soft);border:1px solid var(--accent-border);margin-bottom:9px}
  .ovcard .ovi svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8}
  .ovcard .ovv{font-family:var(--serif);font-size:20px;font-weight:500;letter-spacing:-.02em;line-height:1}
  .ovcard .ovl{font-size:11px;color:var(--muted);margin-top:4px}
  .attn{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--line);cursor:pointer}
  .attn:last-child{border-bottom:0}
  .attn .ai{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;flex-shrink:0}
  .attn .ai svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2}
  .attn .at{flex:1;font-size:12.5px;color:var(--text-2)}.attn .at b{color:var(--text);font-weight:600}
  .ai.warn{background:var(--warn-soft);color:var(--warn-text)} .ai.ok{background:var(--ok-soft);color:var(--ok-text)}
  .attn .ago{color:var(--muted);font-size:13px}

  /* media model roster */
  .msub{display:flex;gap:4px;margin-bottom:11px;border-bottom:1px solid var(--line-2)}
  .msub button{font:inherit;font-size:12px;font-weight:600;color:var(--muted);background:transparent;border:0;border-bottom:2px solid transparent;margin-bottom:-1px;padding:8px 12px;cursor:pointer;transition:.14s}
  .msub button:hover{color:var(--text-2)} .msub button.on{color:var(--text);border-bottom-color:var(--accent)}
  .msub .mct{font-family:var(--mono);font-size:10px;color:var(--muted);margin-left:5px}
  .modellist{display:flex;flex-direction:column;max-height:360px;overflow:auto;margin:0 -4px;padding:0 4px}
  .mrow{display:flex;align-items:center;gap:11px;padding:9px 2px;border-bottom:1px solid var(--line)}
  .mrow:last-child{border-bottom:0}
  .mlogo{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;font-family:var(--mono);font-weight:600;font-size:10px;flex-shrink:0;line-height:1}
  .mrow .mi{flex:1;min-width:0}.mrow .mn{font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:7px}.mrow .mp{font-size:10.5px;color:var(--muted)}
  .mbadge{font-size:8px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--accent-contrast);background:var(--accent-soft);border:1px solid var(--accent-border);border-radius:4px;padding:1px 5px}
  .mrow .btn{flex-shrink:0}

  /* locked toggle + pill+action rows */
  .sw.locked{cursor:not-allowed;opacity:.85}.sw.locked i{background:var(--muted)}
  .locklbl{display:inline-flex;align-items:center;gap:8px}.locklbl svg{width:13px;height:13px;stroke:var(--muted);fill:none;stroke-width:2}
  .pillrow{display:inline-flex;align-items:center;gap:9px}
  .pillrow .ptxt{font-size:12.5px;color:var(--text-2)}
</style>
<script>try{if(window.top!==window.self)document.documentElement.classList.add("is-embedded")}catch(e){document.documentElement.classList.add("is-embedded")}</script><style>html.is-embedded .rail,html.is-embedded .sidebar,html.is-embedded aside.rail{display:none!important}html.is-embedded .app{grid-template-columns:minmax(0,1fr)!important}</style>
</head>
<body>
<div class="app">
  <aside class="rail">
    <div class="ws"><img src="brand/arc-mark.png" alt="Arc" style="height:30px;width:auto;object-fit:contain;flex-shrink:0"><div><div class="nm">Arc Marketing</div><div class="pl">Restoration · Premium</div></div><span class="cv">▾</span></div>
    <div class="indtag"><i></i>RESTORATION workspace</div>

var cur='overview', connCat='All', mediaCat='image', mediaDefault={image:'auto',video:'auto',audio:'auto'};
function renderMain(){
  document.getElementById('setmain').innerHTML=(SEC[cur]||SEC.general)();
  document.getElementById('setmain').scrollTop=0; document.querySelector('.setmain').scrollTop=0;
  bindControls();
}
function bindControls(){
  document.querySelectorAll('.seg').forEach(function(g){g.querySelectorAll('button').forEach(function(b){b.addEventListener('click',function(){g.querySelectorAll('button').forEach(function(x){x.classList.remove('on')});b.classList.add('on');toast('Saved · '+g.getAttribute('data-seg')+' = '+b.getAttribute('data-v'));});});});
  document.querySelectorAll('.sw').forEach(function(w){w.addEventListener('click',function(){w.classList.toggle('on');toast(w.classList.contains('on')?'Enabled':'Disabled');});});
  document.querySelectorAll('[data-accent] .accopt').forEach(function(a){a.addEventListener('click',function(){a.parentNode.querySelectorAll('.accopt').forEach(function(x){x.classList.remove('on')});a.classList.add('on');document.documentElement.style.setProperty('--accent',a.style.background);toast('Accent saved');});});
  document.querySelectorAll('[data-rm]').forEach(function(b){b.addEventListener('click',function(){var r=b.closest('.mem,.tok');if(r){r.style.opacity='.4';setTimeout(function(){r.remove();},150);}toast('Removed');});});
  document.querySelectorAll('[data-test]').forEach(function(b){b.addEventListener('click',function(){toast('Connection test passed · recordConnectorTest');});});
  document.querySelectorAll('[data-invite]').forEach(function(b){b.addEventListener('click',function(){toast('Invite sent — branded email via Resend');});});
  document.querySelectorAll('[data-switch],[data-fb]').forEach(function(b){b.addEventListener('click',function(){toast('Preview — wired to the real action');});});
  document.querySelectorAll('.inp').forEach(function(i){i.addEventListener('change',function(){toast('Saved');});});
  document.querySelectorAll('[data-goto]').forEach(function(g){g.addEventListener('click',function(){cur=g.getAttribute('data-goto');renderNav('');renderMain();});});
  if(cur==='connections'){
    fillConnGrid();
    var cq=document.getElementById('connq'); if(cq)cq.addEventListener('input',applyConnFilter);
    document.querySelectorAll('#catchips .catchip').forEach(function(c){c.addEventListener('click',function(){connCat=c.getAttribute('data-cat');document.querySelectorAll('#catchips .catchip').forEach(function(x){x.classList.remove('on')});c.classList.add('on');applyConnFilter();});});
  }
  if(cur==='media'){
    fillModelList();
    var mq=document.getElementById('modelq'); if(mq)mq.addEventListener('input',applyModelFilter);
    document.querySelectorAll('#msub button').forEach(function(b){b.addEventListener('click',function(){mediaCat=b.getAttribute('data-mcat');document.querySelectorAll('#msub button').forEach(function(x){x.classList.remove('on')});b.classList.add('on');fillModelList();});});
  }
  document.querySelectorAll('[data-locked]').forEach(function(w){w.addEventListener('click',function(){toast('Locked — Arc can never send, post, or spend without your approval.');});});
}
