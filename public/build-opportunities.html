<style>
  :root{
    --canvas:#16161a; --canvas-deep:#101013; --panel:#1b1b20; --inset:#202027; --raised:#26262d; --sidebar:#121316;
    --line:rgba(232,224,205,.08); --line-2:rgba(232,224,205,.12); --line-3:rgba(232,224,205,.20);
    --text:#f1ede2; --text-2:#b9b9c0; --muted:#83838c;
    --accent:#c8a24a; --accent-soft:rgba(200,162,74,.12); --accent-border:rgba(200,162,74,.34); --accent-contrast:#ecd596;
    --ok:#7fb89a; --ok-text:#a3d0b8; --ok-soft:rgba(127,184,154,.14); --ok-border:rgba(127,184,154,.4);
    --warn:#d8b65e; --warn-text:#e6cf8e; --warn-border:rgba(216,182,94,.4); --warn-soft:rgba(216,182,94,.14);
    --red:#cc6666; --red-text:#e0a3a3; --red-border:rgba(204,102,102,.42); --red-soft:rgba(204,102,102,.15);
    --info:#88b6d8; --info-text:#a9cdea; --info-border:rgba(136,182,216,.4); --info-soft:rgba(136,182,216,.13);
    --serif:"Fraunces",Georgia,serif; --sans:"Geist",ui-sans-serif,system-ui,sans-serif; --mono:"Geist Mono",ui-monospace,monospace;
    --ease:cubic-bezier(.16,1,.3,1);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--canvas);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;font-size:14px;line-height:1.5}
  a{color:inherit;text-decoration:none}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  .app{display:grid;grid-template-columns:236px minmax(0,1fr);height:100vh;overflow:hidden}

  .rail{display:flex;flex-direction:column;min-height:0;background:var(--sidebar);border-right:1px solid var(--line-2);padding:14px 12px}
  .ws{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:9px;cursor:pointer;transition:background .16s var(--ease)}
  .ws:hover{background:rgba(255,255,255,.045)}
  .ws .mk{width:30px;height:30px;border-radius:8px;border:1px solid var(--accent-border);background:var(--accent-soft);display:grid;place-items:center;font-family:var(--serif);font-weight:600;color:var(--accent);font-size:15px}
  .ws .nm{font-weight:600;font-size:13px;letter-spacing:-.01em;line-height:1.15}
  .ws .pl{font-size:10px;color:var(--muted)}
  .ws .cv{margin-left:auto;color:var(--muted);font-size:11px}
  .indtag{margin:8px 8px 6px;font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;color:var(--muted);border:1px solid var(--line-2);border-radius:6px;padding:4px 8px;display:flex;align-items:center;gap:6px}
  .indtag i{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:breathe 3.4s var(--ease) infinite}
  @keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(200,162,74,.4);opacity:.65}50%{box-shadow:0 0 0 4px rgba(200,162,74,0);opacity:1}}
  .navwrap{flex:1;min-height:0;overflow:auto;padding-top:2px}
  .grp{font-size:9.5px;font-weight:600;letter-spacing:.13em;color:var(--muted);padding:13px 10px 6px}.grp:first-child{padding-top:2px}
  .nav{display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:8px;color:var(--text-2);font-size:13px;font-weight:500;position:relative;cursor:pointer;transition:background .15s var(--ease),color .15s var(--ease)}
  .nav svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.7;opacity:.85}
  .nav:hover{background:rgba(255,255,255,.035);color:var(--text)}
  .nav.on{color:var(--text);background:linear-gradient(90deg,var(--accent-soft),transparent 80%)}
  .nav.on svg{color:var(--accent);opacity:1}
  .nav.on .tick{position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:2px;height:18px;border-radius:2px;background:var(--accent)}
  .user{display:flex;align-items:center;gap:10px;padding:10px 8px 2px;margin-top:8px;border-top:1px solid var(--line);cursor:pointer}
  .av{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);background:var(--inset);display:grid;place-items:center;font-family:var(--serif);font-weight:600;color:var(--accent);font-size:13px}
  .user .nm{font-size:12.5px;font-weight:600}.user .cog{margin-left:auto;color:var(--muted)}

  .main{display:flex;flex-direction:column;min-width:0;min-height:0}
  .top{display:flex;align-items:center;gap:14px;padding:11px 22px;border-bottom:1px solid var(--line-2);background:color-mix(in srgb,var(--canvas-deep) 60%,transparent)}
  .top .crumb{font-size:14px;font-weight:600;font-family:var(--serif);letter-spacing:-.01em}
  .search{margin:0 auto;display:flex;align-items:center;gap:9px;width:300px;max-width:34vw;height:32px;padding:0 11px;border:1px solid var(--line-2);border-radius:8px;background:color-mix(in srgb,var(--inset) 70%,transparent);color:var(--muted);font-size:12.5px;cursor:pointer;transition:border-color .15s,color .15s}
  .search:hover{border-color:var(--accent-border);color:var(--text-2)}
  .search svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.7}
  .search .k{margin-left:auto;font-family:var(--mono);font-size:10px;border:1px solid var(--line-2);border-radius:5px;padding:1px 6px}
  .topav{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);background:var(--inset);display:grid;place-items:center;font-family:var(--serif);font-weight:600;color:var(--accent);font-size:12px;cursor:pointer}

  .oppgrid{flex:1;min-height:0;display:grid;grid-template-columns:362px minmax(0,1fr)}
  .olist{border-right:1px solid var(--line);min-height:0;overflow:auto;padding:14px 12px;background:color-mix(in srgb,var(--canvas-deep) 14%,transparent)}
  .olisthd{display:flex;align-items:center;justify-content:space-between;padding:4px 8px 12px}
  .olisthd .h{font-size:11px;font-weight:600;letter-spacing:.04em;color:var(--muted)}
  .olisthd .c{font-family:var(--mono);font-size:11px;color:var(--muted)}
  .orow{display:grid;grid-template-columns:30px minmax(0,1fr);gap:11px;align-items:center;padding:12px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:background .15s var(--ease),border-color .15s}
  .orow:hover{background:rgba(255,255,255,.03)}
  .orow.on{background:var(--accent-soft);border-color:var(--accent-border)}
  .orow .ic{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);background:var(--inset);display:grid;place-items:center;color:var(--accent)}
  .orow .ic svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.7}
  .orow .ot{font-size:13px;font-weight:600;letter-spacing:-.005em;display:flex;align-items:baseline;gap:7px}
  .orow .pct{margin-left:auto;font-family:var(--mono);font-size:11.5px;color:var(--accent)}
  .orow .om{font-size:10.5px;color:var(--muted);margin-top:3px;display:flex;align-items:center;gap:7px}
  .orow .src{border:1px solid var(--line-2);background:var(--inset);border-radius:5px;padding:1px 6px;font-size:9.5px;color:var(--text-2)}

  .odetail{min-width:0;overflow:auto;padding:30px clamp(22px,3.2vw,44px) 56px}
  .odetail .inner{max-width:1000px}
  .metarow{display:flex;align-items:center;gap:10px;margin-bottom:13px}
  .tchip{display:inline-flex;align-items:center;gap:7px;height:24px;padding:0 11px;border:1px solid var(--line-2);background:var(--inset);border-radius:7px;font-size:11px;color:var(--text-2)}
  .tchip i{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .metarow .det{font-size:11px;color:var(--muted)}
  .upill{display:inline-flex;align-items:center;height:22px;padding:0 9px;border-radius:6px;font-size:10.5px;font-weight:600}
  .upill.red{color:var(--red-text);background:var(--red-soft);border:1px solid var(--red-border)}
  .upill.amber{color:var(--warn-text);background:var(--warn-soft);border:1px solid var(--warn-border)}
  .upill.info{color:var(--info-text);background:var(--info-soft);border:1px solid var(--info-border)}
  .dttl{font-family:var(--serif);font-weight:500;font-size:clamp(1.5rem,2.5vw,2.05rem);line-height:1.1;letter-spacing:-.018em;margin:0}

  .dgrid{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:30px;margin-top:24px;align-items:start}
  @media(max-width:1080px){.dgrid{grid-template-columns:1fr}}
  .lab{font-size:10px;font-weight:700;letter-spacing:.13em;color:var(--muted);text-transform:uppercase;margin-bottom:11px}
  .blk{margin-top:26px}

  .evrow{display:grid;grid-template-columns:26px minmax(0,1fr) auto;gap:12px;align-items:center;padding:12px 14px;border:1px solid var(--line-2);border-radius:10px;background:var(--panel);cursor:pointer;transition:border-color .15s,transform .15s var(--ease);margin-bottom:9px}
  .evrow:hover{border-color:var(--accent-border);transform:translateX(2px)}
  .evrow .n{width:26px;height:26px;border-radius:7px;background:var(--accent-soft);border:1px solid var(--accent-border);display:grid;place-items:center;font-family:var(--mono);font-size:10px;color:var(--accent)}
  .evrow .es{font-size:12.5px;font-weight:600}.evrow .ed{font-size:11.5px;color:var(--muted);margin-top:2px}
  .evrow .go{color:var(--muted);font-size:14px}.evrow:hover .go{color:var(--accent)}

  .recpanel{border:1px solid var(--line-2);border-radius:12px;background:color-mix(in srgb,var(--panel) 88%,transparent);padding:18px 20px}
  .recpanel .rl{font-size:10px;font-weight:700;letter-spacing:.13em;color:var(--accent);text-transform:uppercase}
  .recpanel .rtxt{font-size:13.5px;color:var(--text);line-height:1.6;margin-top:9px}
  .recpanel .sub{font-size:11px;color:var(--muted);margin:16px 0 8px}
  .types{display:flex;flex-wrap:wrap;gap:8px}
  .ty{font-size:11px;color:var(--text-2);border:1px solid var(--line-2);background:var(--inset);border-radius:6px;padding:4px 10px}
  .racts{display:flex;align-items:center;gap:10px;margin-top:20px;padding-top:18px;border-top:1px solid var(--line);flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:7px;height:36px;padding:0 16px;border-radius:9px;cursor:pointer;font-weight:600;font-size:12.5px;transition:transform .15s var(--ease),filter .15s,border-color .15s,color .15s}
  .btn.gold{border:1px solid color-mix(in srgb,var(--accent) 66%,#fff 8%);background:linear-gradient(180deg,#e1c074,var(--accent) 58%,#a9842f);color:#1a1505;box-shadow:inset 0 1px 0 rgba(255,255,255,.25)}
  .btn.gold:hover{transform:translateY(-1px);filter:brightness(1.03)}
  .btn.ghost{border:1px solid var(--line-2);background:transparent;color:var(--text-2)}
  .btn.ghost:hover{border-color:var(--line-3);color:var(--text)}

  /* draft preview */
  .draftcard{border:1px solid var(--line-2);border-radius:12px;overflow:hidden;background:var(--panel)}
  .draftcard .dh{display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid var(--line);background:color-mix(in srgb,var(--inset) 45%,transparent)}
  .draftcard .da{width:24px;height:24px;border-radius:6px;border:1px solid var(--accent-border);background:var(--accent-soft);display:grid;place-items:center;font-family:var(--serif);font-weight:600;color:var(--accent);font-size:11px}
  .draftcard .dmeta{font-size:11.5px;color:var(--text-2)}.draftcard .dmeta b{color:var(--text)}
  .chtabs{margin-left:auto;display:flex;gap:4px}
  .chtab{font-size:10.5px;color:var(--muted);padding:3px 9px;border-radius:6px;cursor:pointer;border:1px solid transparent;transition:.14s}
  .chtab:hover{color:var(--text-2)}.chtab.on{color:var(--text);background:var(--inset);border-color:var(--line-2)}
  .draftbody{padding:15px 18px}
  .draftbody .subj{font-size:13.5px;font-weight:600;color:var(--text);margin-bottom:8px}
  .draftbody .bd{font-size:12.5px;color:var(--text-2);line-height:1.65;max-width:64ch}
  .draftfoot{display:flex;align-items:center;gap:9px;padding:11px 18px;border-top:1px solid var(--line);font-size:10.5px;color:var(--muted)}
  .prov{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line-2);background:var(--inset);border-radius:6px;padding:3px 8px;color:var(--text-2)}
  .prov i{width:6px;height:6px;border-radius:50%;background:var(--ok)}

  /* outcomes / learning */
  .play{display:grid;grid-template-columns:minmax(0,1fr) auto;gap:12px;align-items:center;padding:12px 14px;border:1px solid var(--line);border-radius:10px;background:color-mix(in srgb,var(--panel) 70%,transparent);margin-bottom:8px}
  .play .pn{font-size:12.5px;font-weight:600}.play .pw{font-size:10.5px;color:var(--muted);margin-top:2px}
  .play .po{font-family:var(--mono);font-size:11px;color:var(--ok-text);text-align:right;white-space:nowrap}

  /* right rail cards */
  .side{display:flex;flex-direction:column;gap:14px;position:sticky;top:0}
  .card{border:1px solid var(--line-2);border-radius:12px;background:var(--panel);padding:16px}
  .card .cl{font-size:10px;font-weight:700;letter-spacing:.12em;color:var(--muted);text-transform:uppercase;margin-bottom:10px}
  .bignum{font-family:var(--serif);font-weight:500;font-size:30px;letter-spacing:-.02em;color:var(--accent-contrast);line-height:1}
  .ctrack{height:6px;border-radius:99px;background:var(--inset);overflow:hidden;margin:12px 0 6px}
  .cfill{height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-contrast));transition:width .8s var(--ease)}
  .cnote{font-size:11px;color:var(--muted)}
  .audrow{display:flex;align-items:baseline;gap:8px}.audrow .ac{font-family:var(--serif);font-weight:500;font-size:24px;color:var(--text);letter-spacing:-.02em}.audrow .ap{font-size:12px;color:var(--text-2)}
  .audnote{font-size:11px;color:var(--muted);margin-top:6px}
  .impact{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:9px;overflow:hidden}
  .icell{background:var(--panel);padding:11px 12px}.icell .il{font-size:9.5px;color:var(--muted)}.icell .iv{font-size:16px;font-weight:600;margin-top:3px;font-variant-numeric:tabular-nums;letter-spacing:-.01em}
  .proj{font-size:10px;color:var(--muted);margin-top:9px;display:flex;align-items:center;gap:6px}.proj i{width:5px;height:5px;border-radius:50%;background:var(--accent)}
  .tl{position:relative;padding-left:6px}
  .tlstep{position:relative;padding:0 0 14px 20px}.tlstep:last-child{padding-bottom:0}
  .tlstep::before{content:"";position:absolute;left:3px;top:3px;width:8px;height:8px;border-radius:50%;border:2px solid var(--accent);background:var(--panel)}
  .tlstep::after{content:"";position:absolute;left:6px;top:13px;bottom:-3px;width:1px;background:var(--line-2)}
  .tlstep:last-child::after{display:none}
  .tlstep.done::before{background:var(--accent)}
  .tlstep .ts{font-size:12px;font-weight:500}.tlstep .tr{font-size:10.5px;color:var(--muted);margin-top:1px}
  .expire{margin-top:12px;font-size:10.5px;color:var(--warn-text);display:flex;align-items:center;gap:6px}

  .fade{animation:fade .3s var(--ease)}
  @keyframes fade{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
</style>
<script>try{if(window.top!==window.self)document.documentElement.classList.add("is-embedded")}catch(e){document.documentElement.classList.add("is-embedded")}</script><style>html.is-embedded .rail,html.is-embedded .sidebar,html.is-embedded aside.rail{display:none!important}html.is-embedded .app{grid-template-columns:minmax(0,1fr)!important}</style>

}
@media (max-width:560px){

}
</style>
</head>

var CUR=0;
function renderList(){
  document.getElementById('olist').innerHTML=OPP.map(function(o,i){
    return '<div class="orow '+(i===CUR?'on':'')+'" data-i="'+i+'"><span class="ic">'+ICONS[o.icon]+'</span>'
      +'<div style="min-width:0"><div class="ot">'+o.name+'<span class="pct">'+o.conf+'%</span></div>'
      +'<div class="om">Confidence <span class="src">'+o.src+'</span></div></div></div>';}).join('');
  document.querySelectorAll('.orow').forEach(function(r){r.addEventListener('click',function(){CUR=+r.getAttribute('data-i');renderList();renderDetail();});});
}
function renderDetail(){
  var o=OPP[CUR], chans=o.draft[2].split(' · ');
  document.getElementById('detail').innerHTML=
    '<div class="metarow"><span class="tchip"><i></i>'+o.type+'</span><span class="upill '+o.urg[1]+'">'+o.urg[0]+' urgency</span><span class="det">Detected '+o.detected+' by Arc</span></div>'
    +'<h1 class="dttl">'+o.title+'</h1>'
    +'<div class="dgrid"><div class="mainc">'
      +'<div class="lab">Evidence · '+o.ev.length+' corroborating sources</div>'
      +o.ev.map(function(e,i){return '<div class="evrow"><span class="n">'+(i+1)+'</span><div style="min-width:0"><div class="es">'+e[0]+'</div><div class="ed">'+e[1]+'</div></div><span class="go">→</span></div>';}).join('')

        +'<div class="draftcard"><div class="dh"><span class="da">A</span><div class="dmeta"><b>Arc draft</b> · ready for your review</div>'

      +'</div>'
