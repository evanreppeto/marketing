# Local Supabase stack for the `pnpm sandbox` playground.
# This defines the Dockerized Postgres + Auth + Storage + Studio that
# `supabase start` brings up on your machine. It is LOCAL-ONLY — it never
# touches the go-forward or production projects. See SANDBOX.md.
project_id = "arc-growth-engine"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

# Local mailbox — captures auth/confirmation emails so nothing is sent for real.
[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
# The sandbox app runs on :6001 (see .claude/launch.json / playwright.config.ts).
site_url = "http://127.0.0.1:6001"
additional_redirect_urls = ["http://127.0.0.1:6001", "http://localhost:6001"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
# Seeded users (owner@bsr.test, …) can sign in immediately — no email step locally.
enable_confirmations = false

# Keep the footprint light; the analytics container isn't needed to play.
[analytics]
enabled = false
