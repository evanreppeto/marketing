name: E2E Guardrails (deployed)

# Continuously verifies the DEPLOYED app still works end to end:
#   - the login wall holds (the public can't see the app),
#   - a real operator can sign in and the tenant renders,
#   - the Opportunity inbox is populated,
#   - the campaign approval gate is present.
#
# Runs AFTER merges to main (post-deploy health check), on a schedule (drift
# check), and on demand. It is a deployed-app health guardrail — not a gate on an
# individual PR's own code (only ci.yml's `verify`+`e2e` gate PRs).
#
# TARGET: prod (arc-studio.ai). This used to point at a `marketing-staging`
# Vercel deploy; that project was deleted to cut cost, so the job hardcoded a URL
# that 404s and went permanently red — which silently masked real regressions.
# There is no staging app: do NOT repoint at a staging alias.
#
# CREDENTIALS: the authenticated job needs PROD_E2E_EMAIL / PROD_E2E_PASSWORD
# repo secrets. There is deliberately NO hardcoded fallback (the old job shipped a
# real password in this YAML). Without the secrets the authenticated job SKIPS with
# a warning instead of failing — a red guardrail nobody can fix is worse than an
# honest skip, because it trains you to ignore the check.
#
# SAFETY: the guardrails are read-only against prod — the only write is the
# sign-in POST (authentication, not business data). No sends, approvals, or record
# mutations. See e2e/guardrails.spec.ts.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8,20 * * *" # twice daily
  workflow_dispatch:

jobs:
  guardrails:
    name: Guardrails (prod, authenticated)
    runs-on: ubuntu-latest
    steps:
      # `secrets` isn't available in a job-level `if`, so gate the steps on this.
      - name: Check for prod credentials
        id: creds
        env:
          E2E_EMAIL: ${{ secrets.PROD_E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.PROD_E2E_PASSWORD }}
        run: |
          if [ -n "$E2E_EMAIL" ] && [ -n "$E2E_PASSWORD" ]; then
            echo "ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "ok=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Authenticated guardrails skipped::Set the PROD_E2E_EMAIL and PROD_E2E_PASSWORD repo secrets to enable the authenticated prod guardrails. The unauthenticated prod smoke still ran."
          fi

      - uses: actions/checkout@v5
        if: steps.creds.outputs.ok == 'true'

      - name: Install pnpm
        if: steps.creds.outputs.ok == 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node
        if: steps.creds.outputs.ok == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        if: steps.creds.outputs.ok == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        if: steps.creds.outputs.ok == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Guardrails against prod
        if: steps.creds.outputs.ok == 'true'
        run: pnpm test:e2e:guardrails
        env:
          E2E_BASE_URL: ${{ vars.PROD_BASE_URL || 'https://arc-studio.ai' }}
          E2E_EMAIL: ${{ secrets.PROD_E2E_EMAIL }}
          E2E_PASSWORD: ${{ secrets.PROD_E2E_PASSWORD }}

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: guardrails-report
          path: playwright-report/
          retention-days: 7

  prod-smoke:
    name: Prod smoke (unauthenticated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke prod (login wall + reachability)
        run: pnpm exec playwright test e2e/prod-smoke.spec.ts
        env:
          E2E_BASE_URL: ${{ vars.PROD_BASE_URL || 'https://arc-studio.ai' }}

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-report
          path: playwright-report/
          retention-days: 7
