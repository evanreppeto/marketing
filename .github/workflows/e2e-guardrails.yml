name: E2E Guardrails (deployed)

# Continuously verifies the DEPLOYED app still works end to end:
#   - the login wall holds (the public can't see the app),
#   - a seeded operator can sign in and the tenant renders,
#   - the Opportunity inbox is populated,
#   - the campaign approval gate is present.
#
# Target is PROD. Staging was retired 2026-07-16 to cut Vercel cost, so these
# now run against arc-studio.ai — every guardrail is read-only (a sign-in plus
# GETs; nothing is sent, approved, or written), which is what makes that safe.
# Runs AFTER merges to main (post-deploy health check) and on a schedule (drift
# check), plus on demand. It is a deployed-app health guardrail — not a gate on
# an individual PR's own code.
#
# Credentials: the authenticated guardrails need the PROD_E2E_PASSWORD secret
# (PROD_E2E_EMAIL optional; defaults to the seeded owner@bsr.test). Without it
# they SKIP — visibly, in the report — rather than fail the run, and no working
# prod credential lives in the repo. The unauthenticated login-wall check and
# the prod-smoke job always run.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 8,20 * * *" # twice daily
  workflow_dispatch:

jobs:
  guardrails:
    name: Guardrails (prod)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Guardrails against prod
        run: pnpm test:e2e:prod
        env:
          E2E_EMAIL: ${{ secrets.PROD_E2E_EMAIL || 'owner@bsr.test' }}
          # No literal fallback — this signs in to production. Unset ⇒ the
          # authenticated guardrails skip; the login-wall check still runs.
          E2E_PASSWORD: ${{ secrets.PROD_E2E_PASSWORD }}

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: guardrails-report
          path: playwright-report/
          retention-days: 7

  prod-smoke:
    name: Prod smoke (unauthenticated)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Smoke prod (login wall + reachability)
        run: pnpm exec playwright test e2e/prod-smoke.spec.ts
        env:
          E2E_BASE_URL: ${{ vars.PROD_BASE_URL || 'https://arc-studio.ai' }}

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-report
          path: playwright-report/
          retention-days: 7
