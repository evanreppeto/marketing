name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        # version is read from the "packageManager" field in package.json

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Node 22 matches Vercel (where the app runs). Node 20 lacks the
          # global WebSocket that supabase-js needs at runtime — pinning 20
          # made route tests fail in CI while passing locally.
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (app)
        run: pnpm typecheck

      - name: Lint (app)
        run: pnpm lint

      - name: Test (app)
        run: pnpm test

      - name: Build (app)
        run: pnpm build

      - name: Typecheck (arc-runner)
        run: pnpm --filter ./apps/arc-runner typecheck

      - name: Test (arc-runner)
        run: pnpm --filter ./apps/arc-runner test

      - name: Test (arc-connector)
        run: pnpm --filter ./packages/arc-connector test

  e2e:
    # Playwright smoke tests (e2e/screens.spec.ts): the front door and the public
    # auth screens (/login, /sign-up, /forgot-password) load and render with zero
    # runtime errors, against a locally-booted dev server with no backend. Runs as
    # its own job so a screen regression is isolated from the app unit tests above.
    # The deployed authenticated flow is covered separately by the E2E Guardrails
    # workflow (e2e/guardrails.spec.ts), which skips here (no E2E_BASE_URL).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E smoke tests (screens)
        run: pnpm test:e2e

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
